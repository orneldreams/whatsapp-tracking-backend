version: '3.8'

services:
  whatsapp-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: whatsapp-tracking-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./whatsapp_tracking.db
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - TWILIO_PHONE_NUMBER=${TWILIO_PHONE_NUMBER}
      - WEBHOOK_URL=${WEBHOOK_URL}
      - DEBUG=false
      - PYTHONUNBUFFERED=1
    volumes:
      - ./whatsapp_tracking.db:/app/whatsapp_tracking.db
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  db_data:
    driver: local
